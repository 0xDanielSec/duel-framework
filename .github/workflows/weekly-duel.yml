name: Weekly DUEL Battle

on:
  schedule:
    - cron: "0 8 * * 1"   # Every Monday 08:00 UTC
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

permissions:
  contents: write           # Required to push results back to repo

jobs:
  weekly-battle:
    runs-on: ubuntu-latest
    timeout-minutes: 120    # 8 techniques × ~10 min each

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify GROQ_API_KEY is set
        run: |
          if [ -z "${GROQ_API_KEY}" ]; then
            echo "::error::GROQ_API_KEY secret is not set. Add it in Settings → Secrets → Actions."
            exit 1
          fi
          echo "GROQ_API_KEY is present (${#GROQ_API_KEY} chars)"
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Create output directory
        run: mkdir -p output

      - name: Run weekly battle — all 8 techniques
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/weekly_battle.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ README.md
          DATE=$(date -u +%Y-%m-%d)
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: weekly automated battle ${DATE}"
            git push
          fi
